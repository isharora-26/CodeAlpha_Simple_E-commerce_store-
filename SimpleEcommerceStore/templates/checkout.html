{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Checkout</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<div class="cart-container">

<h1>Checkout</h1>

{% for item in cart_items %}

<p>
{{ item.product.name }}
-
{{ item.quantity }}
×
₹{{ item.product.price }}
</p>

{% endfor %}

<hr>

<h2>Total: ₹{{ total }}</h2>

<form method="POST">

{% csrf_token %}

<button type="submit">

Place Order

</button>

</form>

</div>
<footer>
    <p>© 2026 Simple Ecommerce Store </p>
</body>
</html>
