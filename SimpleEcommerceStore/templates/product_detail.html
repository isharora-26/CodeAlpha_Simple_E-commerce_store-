{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ product.name }}</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<div class="product-detail">

    <img src="{{ product.image.url }}" alt="{{ product.name }}">

    <div class="details">

        <h1>{{ product.name }}</h1>

        <h2>₹{{ product.price }}</h2>

        <p>
            {{ product.description }}
        </p>

        <a href="{% url 'add_to_cart' product.id %}" class="btn">
            Add to Cart
        </a>

        <a href="{% url 'products' %}" class="btn">
            Back
        </a>

    </div>

</div>

</body>
</html>
