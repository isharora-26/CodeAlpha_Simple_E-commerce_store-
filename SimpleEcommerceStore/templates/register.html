{% load static %}

<!DOCTYPE html>
<html>
<head>

    <title>Register</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">

</head>

<body>

<div class="login-container">

<h1>Create Account</h1>

<form method="POST">

{% csrf_token %}

<input type="text"
       name="username"
       placeholder="Username"
       required>

<input type="email"
       name="email"
       placeholder="Email"
       required>

<input type="password"
       name="password"
       placeholder="Password"
       required>

<button type="submit">

Register

</button>

</form>

</div>
<footer>
    <p>© 2026 Simple Ecommerce Store </p>
</body>

</html>
