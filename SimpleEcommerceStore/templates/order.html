<h1>My Orders</h1>

{% if orders %}

<table border="1" cellpadding="10">

<tr>
    <th>Order ID</th>
    <th>Total</th>
    <th>Date</th>
</tr>

{% for order in orders %}

<tr>
    <td>{{ order.id }}</td>
    <td>₹{{ order.total_price }}</td>
    <td>{{ order.created_at }}</td>
</tr>

{% endfor %}

</table>

{% else %}

<h2>No Orders Yet!</h2>

<p>You haven't placed any orders yet.</p>

<a href="{% url 'products' %}">
    Continue Shopping
</a>

{% endif %}
